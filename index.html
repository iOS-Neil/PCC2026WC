<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup 2026 Predictor</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and Babel for the app logic -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Firebase (Older 'Compat' version for maximum browser compatibility in one file) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const firebaseConfig = {
            apiKey: "AIzaSyC2Sr5IcLU9p2HopvBvOFlsBRGZtB1y9NE",
            authDomain: "pcc2026wc.firebaseapp.com",
            databaseURL: "https://pcc2026wc-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "pcc2026wc",
            storageBucket: "pcc2026wc.firebasestorage.app",
            messagingSenderId: "435446315061",
            appId: "1:435446315061:web:ab2b76edfb08e8ee6b997c"
        };

        // Initialize Firebase using the Compat SDK
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        const appId = "my-world-cup-predictor-2026";

        const COUNTRY_FLAGS = {
            "Mexico": "рџ‡Ірџ‡Ѕ", "South Africa": "рџ‡їрџ‡¦", "South Korea": "рџ‡°рџ‡·", "Czech Republic": "рџ‡Ёрџ‡ї",
            "Canada": "рџ‡Ёрџ‡¦", "Bosnia": "рџ‡§рџ‡¦", "Qatar": "рџ‡¶рџ‡¦", "Switzerland": "рџ‡Ёрџ‡­",
            "Brazil": "рџ‡§рџ‡·", "Morocco": "рџ‡Ірџ‡¦", "Haiti": "рџ‡­рџ‡№", "Scotland": "рџЏґу Ѓ§у Ѓўу Ѓіу ЃЈу Ѓґу Ѓї",
            "USA": "рџ‡єрџ‡ё", "Paraguay": "рџ‡µрџ‡ѕ", "Australia": "рџ‡¦рџ‡є", "Turkey": "рџ‡№рџ‡·",
            "Germany": "рџ‡©рџ‡Є", "CuraГ§ao": "рџ‡Ёрџ‡ј", "Ivory Coast": "рџ‡Ёрџ‡®", "Ecuador": "рџ‡Єрџ‡Ё",
            "Netherlands": "рџ‡ірџ‡±", "Japan": "рџ‡Їрџ‡µ", "Sweden": "рџ‡ёрџ‡Є", "Tunisia": "рџ‡№рџ‡і",
            "Belgium": "рџ‡§рџ‡Є", "Egypt": "рџ‡Єрџ‡¬", "Iran": "рџ‡®рџ‡·", "New Zealand": "рџ‡ірџ‡ї",
            "Spain": "рџ‡Єрџ‡ё", "Cape Verde": "рџ‡Ёрџ‡»", "Saudi Arabia": "рџ‡ёрџ‡¦", "Uruguay": "рџ‡єрџ‡ѕ"
        };

        const GROUPS_TEAMS = {
            A: ["Mexico", "South Africa", "South Korea", "Czech Republic"],
            B: ["Canada", "Bosnia", "Qatar", "Switzerland"],
            C: ["Brazil", "Morocco", "Haiti", "Scotland"],
            D: ["USA", "Paraguay", "Australia", "Turkey"],
            E: ["Germany", "CuraГ§ao", "Ivory Coast", "Ecuador"],
            F: ["Netherlands", "Japan", "Sweden", "Tunisia"],
            G: ["Belgium", "Egypt", "Iran", "New Zealand"],
            H: ["Spain", "Cape Verde", "Saudi Arabia", "Uruguay"]
        };

        function App() {
            const [user, setUser] = React.useState(null);
            const [matches, setMatches] = React.useState([]);
            const [predictions, setPredictions] = React.useState([]);
            const [activeTab, setActiveTab] = React.useState('predictions');
            const [activeGroup, setActiveGroup] = React.useState('A');
            const [loading, setLoading] = React.useState(true);

            React.useEffect(() => {
                // Sign in anonymously and set user
                auth.signInAnonymously().catch(console.error);
                auth.onAuthStateChanged((u) => setUser(u));

                // Listen for Live Data
                const dataRef = db.ref(`artifacts/${appId}/public/data`);
                dataRef.on('value', (snapshot) => {
                    const data = snapshot.val() || {};
                    if (data.matches) {
                        setMatches(Object.keys(data.matches).map(k => ({ ...data.matches[k], id: k })));
                    }
                    if (data.predictions) {
                        setPredictions(Object.keys(data.predictions).map(k => ({ ...data.predictions[k], id: k })));
                    }
                    setLoading(false);
                });
            }, []);

            const handleUpdatePrediction = (matchId, team, change) => {
                if (!user) return;
                const predId = `${user.uid}_${matchId}`;
                const found = predictions.find(p => p.id === predId) || { homePredict: 0, awayPredict: 0 };
                let h = found.homePredict, a = found.awayPredict;
                if (team === 'home') h = Math.max(0, h + change); else a = Math.max(0, a + change);

                db.ref(`artifacts/${appId}/public/data/predictions/${predId}`).set({
                    userId: user.uid, matchId, homePredict: h, awayPredict: a, updatedAt: new Date().toISOString()
                });
            };

            if (loading) return <div className="flex h-screen items-center justify-center text-emerald-400 font-bold">CONNECTING...</div>;

            return (
                <div className="max-w-4xl mx-auto p-4 md:p-8 space-y-8">
                    <header className="text-center space-y-2">
                        <h1 className="text-4xl font-black bg-gradient-to-r from-emerald-400 to-teal-300 bg-clip-text text-transparent uppercase tracking-tighter">
                            World Cup 2026 Predictor
                        </h1>
                        <p className="text-slate-500 text-[10px] font-bold uppercase tracking-widest">Realtime Forecast Port Live</p>
                    </header>

                    <div className="flex bg-slate-900 p-1 rounded-2xl border border-slate-800">
                        {['predictions', 'leaderboard'].map(t => (
                            <button key={t} onClick={() => setActiveTab(t)} className={`flex-1 py-3 text-xs font-black rounded-xl transition-all capitalize ${activeTab === t ? 'bg-emerald-500 text-slate-950 shadow-lg' : 'text-slate-400'}`}>
                                {t}
                            </button>
                        ))}
                    </div>

                    {activeTab === 'predictions' && (
                        <div className="space-y-6">
                            <div className="flex flex-wrap gap-1.5 bg-slate-900/50 p-1.5 rounded-2xl border border-slate-800">
                                {Object.keys(GROUPS_TEAMS).map(g => (
                                    <button key={g} onClick={() => setActiveGroup(g)} className={`flex-1 min-w-[50px] text-[10px] font-black py-2 rounded-xl transition-all ${activeGroup === g ? 'bg-slate-800 text-emerald-400 border border-emerald-950/20' : 'text-slate-500'}`}>
                                        GRP {g}
                                    </button>
                                ))}
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                {matches.filter(m => m.group === activeGroup).map(m => {
                                    const p = predictions.find(pred => pred.matchId === m.id && pred.userId === user?.uid) || { homePredict: 0, awayPredict: 0 };
                                    return (
                                        <div key={m.id} className="bg-slate-900 p-6 rounded-[2.5rem] border border-slate-800 shadow-2xl space-y-6">
                                            <div className="flex justify-between items-center text-center">
                                                <div className="w-1/3">
                                                    <span className="text-4xl block mb-2">{COUNTRY_FLAGS[m.home] || 'рџЏіпёЏ'}</span>
                                                    <span className="text-[10px] font-black text-slate-300 uppercase truncate block">{m.home}</span>
                                                </div>
                                                <div className="text-slate-700 font-black text-xs">VS</div>
                                                <div className="w-1/3">
                                                    <span className="text-4xl block mb-2">{COUNTRY_FLAGS[m.away] || 'рџЏіпёЏ'}</span>
                                                    <span className="text-[10px] font-black text-slate-300 uppercase truncate block">{m.away}</span>
                                                </div>
                                            </div>
                                            <div className="bg-slate-950 p-4 rounded-3xl border border-slate-800 flex justify-between items-center shadow-inner">
                                                <div className="flex items-center gap-3">
                                                    <button onClick={() => handleUpdatePrediction(m.id, 'home', -1)} className="w-8 h-8 bg-slate-800 hover:bg-slate-700 rounded-xl font-black transition-colors">-</button>
                                                    <span className="w-4 text-center font-black text-emerald-400 text-lg">{p.homePredict}</span>
                                                    <button onClick={() => handleUpdatePrediction(m.id, 'home', 1)} className="w-8 h-8 bg-slate-800 hover:bg-slate-700 rounded-xl font-black transition-colors">+</button>
                                                </div>
                                                <div className="flex items-center gap-3">
                                                    <button onClick={() => handleUpdatePrediction(m.id, 'away', -1)} className="w-8 h-8 bg-slate-800 hover:bg-slate-700 rounded-xl font-black transition-colors">-</button>
                                                    <span className="w-4 text-center font-black text-emerald-400 text-lg">{p.awayPredict}</span>
                                                    <button onClick={() => handleUpdatePrediction(m.id, 'away', 1)} className="w-8 h-8 bg-slate-800 hover:bg-slate-700 rounded-xl font-black transition-colors">+</button>
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    )}

                    {activeTab === 'leaderboard' && (
                        <div className="bg-slate-900 p-8 rounded-[3rem] border border-slate-800 text-center text-slate-500 font-bold uppercase tracking-widest text-sm">
                            Standings feature coming soon in the next matchday update!
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
